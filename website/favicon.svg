<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- C shape: center (50,50), radius 35, stroke 13, gap ±42° from east -->
  <!-- Upper gap point: (50+35·cos42°, 50−35·sin42°) = (76.0, 26.6) -->
  <!-- Lower gap point: (76.0, 73.4) -->
  <!-- sweep-flag=0 (counterclockwise on screen), large-arc=1 -->
  <path d="M 76.0 26.6 A 35 35 0 1 0 76.0 73.4"
    fill="none" stroke="#000000" stroke-width="13" stroke-linecap="round"/>
  <!-- Perfectly round blue dot at the C opening -->
  <circle cx="89" cy="50" r="9" fill="#3b82f6"/>
</svg>
